<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
body { background: #fafafa; font-family: sans-serif; padding: 40px; }
.chart-box { width: 100%; height: 300px; position: relative; background: #fff; border: 1px solid #e8e8e8; border-radius: 4px; padding: 16px; }
</style>
</head>
<body>
<h1>Chart Test</h1>
<div class="chart-box">
  <canvas id="myChart"></canvas>
</div>
<script>
const ctx = document.getElementById('myChart').getContext('2d');
new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['North', 'East', 'West', 'South'],
    datasets: [{
      data: [81948, 71398, 63098, 59298],
      backgroundColor: '#1a1a1a',
      borderRadius: 2,
      barPercentage: 0.6
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { display: false }, border: { display: false } },
      y: { grid: { color: 'rgba(0,0,0,0.06)', drawBorder: false }, border: { display: false } }
    }
  }
});
</script>
</body>
</html>
